databases:
  - name: extrema-db
    plan: free
    databaseName: extrema
    user: extrema_user

services:
  - type: web
    name: apex-nutrition-api
    runtime: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: SECURE_COOKIES
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: LOGIN_MAX_ATTEMPTS
        value: "6"
      - key: LOGIN_WINDOW_SECONDS
        value: "60"
      - key: DATABASE_URL
        fromDatabase:
          name: extrema-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://nutricion-extrema.onrender.com
      - key: TRUSTED_HOSTS
        value: extrema-stcg.onrender.com,nutricion-extrema.onrender.com
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false

  - type: web
    name: apex-nutrition-frontend
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: BACKEND_API_ORIGIN
        value: https://extrema-stcg.onrender.com
      - key: NEXT_PUBLIC_API_BASE_URL
        value: /api/v1
      - key: NEXT_PUBLIC_CSRF_COOKIE_NAME
        value: apex_csrf_token
